<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#315f4b" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="Malina ceramik studio ceramiki - prosty obieg ceramiki od półki do odbioru."
    />
    <title>Malina ceramik studio ceramiki</title>
    <link rel="icon" href="assets/malina-app-icon.png" type="image/png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="login-screen" id="login-screen">
      <section class="login-visual" aria-hidden="true">
        <img class="login-visual-wordmark" src="assets/malina-wordmark.png" alt="" />
        <div class="login-visual-copy">
          <span>Malina Ceramik</span>
          <h1>Twoja ceramika.<br />W jednym miejscu.</h1>
        </div>
      </section>
      <section class="login-panel">
        <div class="login-card">
          <div class="login-mobile-brand">
            <span class="mobile-logo-badge"><img src="assets/malina-apron.png" alt="" /></span>
            <img src="assets/malina-wordmark.png" alt="Malina ceramik, studio ceramiki" />
          </div>
          <p class="eyebrow">Aplikacja pracowni</p>
          <h2 id="login-title">Witaj ponownie</h2>
          <button class="guest-login-toggle" id="guest-login-toggle" type="button" aria-pressed="false">
            <span class="guest-toggle-check" aria-hidden="true"></span>
            <span>Wejdź jako gość</span>
          </button>
          <form class="login-form" id="login-form" novalidate>
            <label class="login-field">
              <span>Adres e-mail</span>
              <input id="login-email" name="email" type="email" autocomplete="email" placeholder="twoj@email.pl" required />
            </label>
            <label class="login-field" id="login-password-field">
              <span>Hasło</span>
              <span class="password-input">
                <input id="login-password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
                <button id="toggle-password" type="button" aria-label="Pokaż hasło">Pokaż</button>
              </span>
            </label>
            <p class="login-error hidden" id="login-error" role="alert"></p>
            <button class="primary-button login-submit" id="login-submit" type="submit">Zaloguj się</button>
          </form>
          <div class="demo-login" id="demo-login">
            <span>Wersja demo</span>
            <div>
              <button data-demo-login="student" type="button">Kursant</button>
              <button data-demo-login="instructor" type="button">Instruktor</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div class="app-shell hidden" id="app-shell">
      <aside class="sidebar" aria-label="Nawigacja główna">
        <a class="brand" href="#" aria-label="Malina ceramik studio ceramiki">
          <img
            class="brand-logo"
            src="assets/malina-wordmark.png"
            alt="Malina ceramik, studio ceramiki"
          />
        </a>

        <nav class="desktop-nav" id="desktop-nav"></nav>

        <div class="sidebar-foot">
          <nav class="desktop-utility-nav" id="desktop-utility-nav" aria-label="Biblioteka pracowni"></nav>
          <div class="demo-note" id="environment-note">
            <span class="dot"></span>
            <div>
              <strong id="environment-title">Wersja testowa</strong>
              <small id="cloud-status">Możesz klikać bez obaw</small>
            </div>
          </div>
          <button class="text-button" id="reset-demo" type="button">Przywróć dane demo</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <button class="mobile-brand" data-view="home" aria-label="Przejdź na początek">
            <span class="mobile-logo-badge">
              <img src="assets/malina-apron.png" alt="" />
            </span>
            <img
              class="mobile-wordmark"
              src="assets/malina-wordmark.png"
              alt="Malina ceramik"
            />
          </button>

          <div class="role-switch" aria-label="Wybierz widok demonstracyjny">
            <button class="role-option" data-role="guest" type="button">Gość</button>
            <button class="role-option active" data-role="student" type="button">Kursant</button>
            <button class="role-option" data-role="instructor" type="button">Instruktor</button>
          </div>

          <button class="profile-button" id="profile-button" type="button" aria-label="Profil użytkownika">
            <span class="avatar" id="avatar">AK</span>
            <span class="profile-copy">
              <strong id="profile-name">Anna Kowalska</strong>
              <small id="profile-role">Kursantka</small>
            </span>
            <span class="chevron" aria-hidden="true">⌄</span>
          </button>
          <div class="profile-menu hidden" id="profile-menu">
            <strong id="profile-menu-name">Anna Kowalska</strong>
            <span id="profile-menu-email">anna@malinaceramik.pl</span>
            <button id="logout-button" type="button">Wyloguj się</button>
          </div>
        </header>

        <section class="content" id="app-content" aria-live="polite"></section>
      </main>
    </div>

    <nav class="mobile-nav hidden" id="mobile-nav" aria-label="Nawigacja mobilna"></nav>

    <div class="modal-backdrop hidden" id="modal-backdrop">
      <section
        class="modal"
        id="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      ></section>
    </div>

    <div class="toast hidden" id="toast" role="status"></div>
    <input id="photo-input" type="file" accept="image/*" capture="environment" multiple hidden />
    <input id="final-photo-input" type="file" accept="image/*" capture="environment" multiple hidden />
    <input id="journal-photo-input" type="file" accept="image/*" capture="environment" hidden />

    <script type="module" src="app.js"></script>
  </body>
</html>
